name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check all shell scripts
        run: |
          bash -n loop.sh
          bash -n templates/verify.sh

      - name: ShellCheck
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q shellcheck
          shellcheck -S warning loop.sh templates/verify.sh

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update -q && sudo apt-get install -y -q jq

      - name: Smoke-test init on a scratch repo
        run: |
          SCRATCH="$(mktemp -d)"
          git init -q "$SCRATCH"
          ./loop.sh init "$SCRATCH"
          test -f "$SCRATCH/.loop/PROMPT.md"
          test -x "$SCRATCH/.loop/verify.sh"
          grep -q '.loop/logs/' "$SCRATCH/.gitignore"
          # re-init must refuse, not clobber
          if ./loop.sh init "$SCRATCH" 2>/dev/null; then
            echo "re-init should have refused" >&2; exit 1
          fi
          echo "smoke: init OK"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
